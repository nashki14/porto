version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio_app
    restart: unless-stopped
    ports:
      - "8085:80"
    environment:
      APP_NAME: "Portfolio"
      APP_ENV: production
      APP_KEY: "base64:v0XfbYgraZAggYNwRxXq+Wb+E2I8TPk6E+jKkT3qF4M="
      APP_DEBUG: "false"
      APP_URL: "http://10.1.1.127:8085"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: portfolio
      DB_USERNAME: portfolio
      DB_PASSWORD: secret123
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    depends_on:
      - db
    networks:
      - portfolio_net

  db:
    image: mysql:8.0
    container_name: portfolio_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: portfolio
      MYSQL_ROOT_PASSWORD: secret123
      MYSQL_USER: portfolio
      MYSQL_PASSWORD: secret123
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - portfolio_net

volumes:
  db_data:

networks:
  portfolio_net:
